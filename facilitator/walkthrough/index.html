<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Copilot Workshop Walkthrough</title>
    <link rel="icon" href="favicon.svg?v=20260622-inline-facilitator-readme" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=20260622-inline-facilitator-readme">
  </head>
  <body>
    <a class="skip-link" href="#lesson-stage">Skip to lesson</a>

    <header class="topbar">
      <a class="brand" href="#/welcome" aria-label="Open workshop welcome">
        <span class="brand-mark">CW</span>
        <span>
          <strong>Copilot Workshop</strong>
          <small>local walkthrough SPA</small>
        </span>
      </a>

      <div class="platform-logos" aria-label="Workshop platform logos">
        <span class="logo-badge" aria-label="GitHub">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1.2A6.8 6.8 0 0 0 5.85 14.45c.34.06.46-.15.46-.33v-1.18c-1.9.41-2.3-.82-2.3-.82-.31-.8-.76-1.01-.76-1.01-.62-.43.05-.42.05-.42.69.05 1.05.71 1.05.71.61 1.05 1.6.75 2 .57.06-.45.24-.75.43-.92-1.52-.17-3.12-.76-3.12-3.38 0-.75.27-1.36.71-1.84-.07-.18-.31-.92.07-1.81 0 0 .58-.19 1.88.7A6.53 6.53 0 0 1 8 4.5c.58 0 1.16.08 1.7.23 1.3-.89 1.88-.7 1.88-.7.38.89.14 1.63.07 1.81.44.48.71 1.09.71 1.84 0 2.63-1.6 3.2-3.13 3.37.25.22.47.65.47 1.31v1.96c0 .18.12.39.47.32A6.8 6.8 0 0 0 8 1.2Z"/>
          </svg>
          GitHub
        </span>
        <span class="logo-badge microsoft" aria-label="Microsoft">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
            <path d="M1.5 1.5h6v6h-6v-6Z" fill="#f25022"/>
            <path d="M8.5 1.5h6v6h-6v-6Z" fill="#7fba00"/>
            <path d="M1.5 8.5h6v6h-6v-6Z" fill="#00a4ef"/>
            <path d="M8.5 8.5h6v6h-6v-6Z" fill="#ffb900"/>
          </svg>
          Microsoft
        </span>
      </div>

      <div class="topbar-actions" aria-label="Walkthrough controls">
        <div class="mode-switch" aria-label="Choose walkthrough mode">
          <button class="icon-button mode-button is-active" type="button" data-mode="facilitator" aria-label="Facilitator mode" title="Facilitator mode">
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M2 3.75A1.75 1.75 0 0 1 3.75 2h8.5A1.75 1.75 0 0 1 14 3.75v5.5A1.75 1.75 0 0 1 12.25 11H9.5l.75 2h1.25v1.5h-7V13h1.25l.75-2H3.75A1.75 1.75 0 0 1 2 9.25v-5.5Zm1.75-.25a.25.25 0 0 0-.25.25v5.5c0 .14.11.25.25.25h8.5c.14 0 .25-.11.25-.25v-5.5a.25.25 0 0 0-.25-.25h-8.5Z"/>
            </svg>
          </button>
          <button class="icon-button mode-button" type="button" data-mode="learner" aria-label="Learner mode" title="Learner mode">
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1.6 1.5 5l6.5 3.4L14.5 5 8 1.6Zm-4 5.2v3.05c0 1.5 1.8 2.7 4 2.7s4-1.2 4-2.7V6.8L8 8.9 4 6.8Z"/>
            </svg>
          </button>
        </div>
        <button class="icon-button ghost-button" id="spotlight-toggle" type="button" aria-label="Focus stage" title="Focus stage">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2 5V2h3v1.5H3.5V5H2Zm8.5-3H14v3h-1.5V3.5h-2V2ZM2 11h1.5v1.5H5V14H2v-3Zm10.5 0H14v3h-3v-1.5h1.5V11ZM5 5h6v6H5V5Z"/>
          </svg>
        </button>
        <button class="icon-button ghost-button" id="reset-progress" type="button" aria-label="Reset progress" title="Reset progress">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 2.5a5.5 5.5 0 1 1-4.62 8.48l1.22-.87A4 4 0 1 0 4.35 6H6.5v1.5H2V3h1.5v1.8A5.48 5.48 0 0 1 8 2.5Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="journey-panel" aria-label="Workshop lesson navigation">
        <section class="progress-card" aria-labelledby="progress-title">
          <div class="progress-ring" id="progress-ring" aria-hidden="true">
            <span id="progress-percent">0%</span>
          </div>
          <div>
            <p class="eyebrow" id="progress-title">Workshop progress</p>
            <h2 id="progress-label">0 of 14 complete</h2>
            <p id="progress-helper">Mark sections complete as you guide the room.</p>
          </div>
        </section>

        <nav class="lesson-list" id="lesson-list" aria-label="Numbered workshop sections"></nav>
      </aside>

      <section class="stage-column">
        <section class="stage-card" id="lesson-stage" tabindex="-1" aria-live="polite"></section>
      </section>
    </main>

    <template id="toast-template">
      <div class="toast" role="status"></div>
    </template>

    <script src="app.js?v=20260622-inline-facilitator-readme"></script>
  </body>
</html>
